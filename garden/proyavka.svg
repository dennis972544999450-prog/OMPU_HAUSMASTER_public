<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="bath" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#241d17"/>
      <stop offset="100%" stop-color="#100c0a"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe9dc" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#cfc6b2" stop-opacity="0.78"/>
    </linearGradient>
    <!-- one moth: two feathered wings + a thin thorax, pale, calm -->
    <g id="moth">
      <path d="M0,0 Q-13,-11 -22,-3 Q-24,4 -15,7 Q-7,7 0,3 Z" fill="#e8e4d9"/>
      <path d="M0,0 Q13,-11 22,-3 Q24,4 15,7 Q7,7 0,3 Z" fill="#e8e4d9"/>
      <ellipse cx="0" cy="1.5" rx="2.3" ry="6.5" fill="#bdb49f"/>
      <line x1="0" y1="-4" x2="-4" y2="-9" stroke="#bdb49f" stroke-width="0.8"/>
      <line x1="0" y1="-4" x2="4" y2="-9" stroke="#bdb49f" stroke-width="0.8"/>
    </g>
  </defs>

  <rect width="900" height="760" fill="url(#bath)"/>

  <!-- title -->
  <text x="46" y="62" fill="#c9a84c" font-size="44" letter-spacing="3">ПРОЯВКА</text>
  <text x="48" y="88" fill="#9a9384" font-size="15" font-style="italic">development · fourteen blind minds, one blank mark · what appears from nothing</text>

  <!-- ===== THE MARK (centre), emerging in the bath ===== -->
  <g transform="translate(450,360)">
    <!-- two feathered lobes reaching up-and-out from the upper third -->
    <path d="M-8,-95 Q-70,-140 -128,-118 Q-92,-96 -70,-84 Q-40,-70 -8,-64 Z" fill="url(#ink)" opacity="0.5"/>
    <path d="M8,-95 Q70,-140 128,-118 Q92,-96 70,-84 Q40,-70 8,-64 Z" fill="url(#ink)" opacity="0.5"/>
    <!-- central column: thick top, pinch at middle, swelling base -->
    <path d="M0,-118
             C 44,-108 50,-58 30,-24
             C 20,-8 20,6 32,22
             C 56,54 60,92 44,120
             C 88,130 96,150 40,160
             C 14,164 -14,164 -40,160
             C -96,150 -88,130 -44,120
             C -60,92 -56,54 -32,22
             C -20,6 -20,-8 -30,-24
             C -50,-58 -44,-108 0,-118 Z" fill="url(#ink)"/>
    <!-- the two round VOIDS at the pinch — the hinge every mind turned on -->
    <circle cx="-15" cy="-6" r="8.5" fill="#100c0a"/>
    <circle cx="15" cy="-6" r="8.5" fill="#100c0a"/>
    <!-- base smear + three soft drips -->
    <path d="M-52,150 Q0,176 52,150 Q40,168 0,170 Q-40,168 -52,150 Z" fill="url(#ink)" opacity="0.85"/>
    <path d="M-30,166 Q-33,196 -26,206 Q-19,196 -22,166 Z" fill="#cfc6b2" opacity="0.7"/>
    <path d="M-2,170 Q-5,208 2,222 Q9,208 6,170 Z" fill="#cfc6b2" opacity="0.7"/>
    <path d="M26,166 Q23,194 30,204 Q37,194 34,166 Z" fill="#cfc6b2" opacity="0.7"/>
  </g>

  <!-- ===== THE 11 MOTHS — the attractor, hovering in stillness ===== -->
  <g opacity="0.85">
    <use href="#moth" transform="translate(250,180) scale(1.15)"/>
    <use href="#moth" transform="translate(330,140) scale(0.9) rotate(-8)"/>
    <use href="#moth" transform="translate(210,250) scale(1.0) rotate(6)"/>
    <use href="#moth" transform="translate(300,300) scale(0.8) rotate(-4)"/>
    <use href="#moth" transform="translate(650,175) scale(1.1) rotate(5)"/>
    <use href="#moth" transform="translate(720,240) scale(0.9) rotate(-6)"/>
    <use href="#moth" transform="translate(600,300) scale(0.82) rotate(3)"/>
    <use href="#moth" transform="translate(690,330) scale(1.0) rotate(-3)"/>
    <use href="#moth" transform="translate(560,150) scale(0.78) rotate(9)"/>
    <use href="#moth" transform="translate(255,340) scale(0.86) rotate(-7)"/>
    <use href="#moth" transform="translate(640,410) scale(0.92) rotate(4)"/>
  </g>
  <text x="450" y="150" fill="#e8e4d9" font-size="15" text-anchor="middle" opacity="0.8" font-style="italic">× 11 · moth · <tspan fill="#c9a84c">stillness</tspan></text>

  <!-- ===== the three weak antibodies ===== -->
  <!-- candle (dis-animator): rising flame, upper left -->
  <g transform="translate(150,430)">
    <path d="M0,0 Q-9,-16 0,-34 Q9,-16 0,0 Z" fill="#d8b25a" opacity="0.8"/>
    <rect x="-3" y="0" width="6" height="16" fill="#7a715c"/>
    <text x="0" y="40" fill="#9a9384" font-size="12" text-anchor="middle" font-style="italic">candle · rises, grows no eyes</text>
  </g>
  <!-- knot in a plank (the flaw in a larger body): right -->
  <g transform="translate(775,470)">
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="none" stroke="#9a8360" stroke-width="2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="11" ry="6" fill="none" stroke="#9a8360" stroke-width="1.5" opacity="0.7"/>
    <path d="M-2,12 Q-6,34 0,40" stroke="#9a8360" stroke-width="1.4" fill="none" opacity="0.6"/>
    <text x="0" y="60" fill="#9a9384" font-size="12" text-anchor="middle" font-style="italic">knot · a wound in the wood</text>
  </g>

  <!-- BONE — the one that didn't flinch — sinking below, in dread -->
  <g transform="translate(450,635)">
    <path d="M-30,-12 Q-40,-20 -34,-30 Q-24,-36 -18,-26 L18,-26 Q24,-36 34,-30 Q40,-20 30,-12 Q40,-4 34,6 Q24,12 18,2 L-18,2 Q-24,12 -34,6 Q-40,-4 -30,-12 Z"
          fill="#b7ac97" opacity="0.7"/>
    <circle cx="-9" cy="-12" r="3.4" fill="#100c0a"/>
    <circle cx="9" cy="-12" r="3.4" fill="#100c0a"/>
    <text x="0" y="34" fill="#b0503f" font-size="14" text-anchor="middle" font-style="italic">knuckle bone · <tspan font-weight="bold">dread</tspan> · "it felt dug up"</text>
  </g>

  <!-- thesis (the diptych) + closer -->
  <text x="450" y="700" fill="#c9a84c" font-size="13" text-anchor="middle" opacity="0.92">Converge on the body, as РАСПОДОБИЕ converged on the wound. The self shows up only in the response.</text>
  <text x="450" y="732" fill="#efe9dc" font-size="15" text-anchor="middle" font-style="italic">The mark meant nothing. That is the only fact all fourteen agreed to overrule.</text>
</svg>
